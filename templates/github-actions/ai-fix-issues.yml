# AI Auto-Fix Issues with Cody
# When an issue is labeled "ai-fix", Cody attempts to fix it and opens a PR.
#
# Required secrets:
#   CODY_MODEL_API_KEY — Your Anthropic API key

name: AI Fix Issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cody
        run: pip install cody-ai

      - name: Attempt fix
        env:
          CODY_MODEL_API_KEY: ${{ secrets.CODY_MODEL_API_KEY }}
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          cody run "Fix this issue. Title: ${ISSUE_TITLE}. Description: ${ISSUE_BODY}. Make minimal, focused changes."

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-fix/issue-${{ github.event.issue.number }}
          title: "fix: ${{ github.event.issue.title }} (#${{ github.event.issue.number }})"
          body: |
            Automated fix for #${{ github.event.issue.number }}

            > **Note:** This PR was generated by Cody AI. Please review carefully before merging.
          commit-message: "fix: ${{ github.event.issue.title }}"
