# AI Code Review with Cody
# Runs Cody on every pull request to review code changes.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Your Anthropic API key

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cody
        run: pip install cody-ai

      - name: Get diff
        run: git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.txt

      - name: AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cody run "Review the following code diff. Focus on bugs, security issues, and performance problems. Be concise. Diff: $(cat /tmp/pr-diff.txt)" > /tmp/review.md

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## AI Code Review\n\n${body}`
            });
