name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: cody-web-linux-amd64
          - os: macos-13
            name: cody-web-darwin-amd64
          - os: macos-latest
            name: cody-web-darwin-arm64
          - os: windows-latest
            name: cody-web-windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[web]"

      - name: Build binary
        run: bash scripts/build-binary.sh ${{ matrix.name }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect archives
        run: |
          mkdir -p release/
          find artifacts/ -name "*.tar.gz" -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
